<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Album</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .album-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }
        .album-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            width: 250px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        .album-card h2 {
            color: #444;
            font-size: 1.2rem;
        }
        .album-card p {
            color: #888;
            font-size: 0.9rem;
        }
        .no-albums {
            text-align: center;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <h1>📷 My Digital Album</h1>

    <div class="album-grid">
        {% if albums %}
            {% for album in albums %}
                <div class="album-card">
                    <h2>{{ album.title }}</h2>
                    <p>📅 {{ album.event_date }}</p>
                    <p>{{ album.description }}</p>
                </div>
            {% endfor %}
        {% else %}
            <div class="no-albums">
                <p>No albums yet. Go to <a href="/admin/">Admin Panel</a> to add one!</p>
            </div>
        {% endif %}
    </div>

</body>
</html>
