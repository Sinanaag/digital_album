<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlock Album — {{ album.title }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f13;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── CARD ── */
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: -60px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 200px;
            background: radial-gradient(circle, rgba(167,139,250,0.15), transparent 70%);
            pointer-events: none;
        }

        /* ── LOCK ICON ── */
        .lock-wrap {
            width: 76px;
            height: 76px;
            border-radius: 22px;
            background: linear-gradient(135deg, #a78bfa22, #60a5fa22);
            border: 1px solid rgba(167,139,250,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            margin: 0 auto 24px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(167,139,250,0.3); }
            50%       { box-shadow: 0 0 0 12px rgba(167,139,250,0); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f1f1f1;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .album-name {
            font-size: 0.88rem;
            color: #6b7280;
            margin-bottom: 32px;
        }

        .album-name span {
            color: #a78bfa;
            font-weight: 500;
        }

        /* ── ERROR ── */
        .error-box {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.85rem;
            color: #f87171;
            margin-bottom: 20px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%       { transform: translateX(-6px); }
            75%       { transform: translateX(6px); }
        }

        /* ── INPUT ── */
        .input-wrap {
            position: relative;
            margin-bottom: 16px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 1.1rem;
            font-family: 'Inter', sans-serif;
            color: #f1f1f1;
            text-align: center;
            letter-spacing: 6px;
            transition: all 0.2s ease;
            outline: none;
        }

        input[type="text"]::placeholder {
            letter-spacing: 1px;
            color: #4b5563;
            font-size: 0.9rem;
        }

        input[type="text"]:focus {
            border-color: rgba(167,139,250,0.6);
            background: rgba(167,139,250,0.06);
            box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
        }

        /* ── BUTTON ── */
        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a78bfa, #60a5fa);
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
        }

        button[type="submit"]:hover {
            opacity: 0.88;
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(167,139,250,0.3);
        }

        button[type="submit"]:active {
            transform: translateY(0);
        }

        /* ── BACK LINK ── */
        .back-link {
            display: block;
            margin-top: 24px;
            font-size: 0.85rem;
            color: #4b5563;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover { color: #9ca3af; }

        /* ── POP IN ── */
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.92) translateY(20px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="lock-wrap">🔒</div>

    <h1>Private Album</h1>
    <p class="album-name">Enter passkey to access <span>{{ album.title }}</span></p>

    {% if error %}
        <div class="error-box">❌ Incorrect passkey. Please try again.</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="input-wrap">
            <input
                type="text"
                name="passkey"
                placeholder="Enter passkey"
                autofocus
                autocomplete="off"
            >
        </div>
        <button type="submit">🔓 Unlock Album</button>
    </form>

    <a href="{% url 'home' %}" class="back-link">← Back to Albums</a>
</div>

</body>
</html>
